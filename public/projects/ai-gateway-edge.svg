<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A browser UI calling an edge gateway that holds the secret key and proxies requests to an AI model">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d0f17"/>
      <stop offset="1" stop-color="#0a0b11"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0" r="0.9">
      <stop offset="0" stop-color="#5061ad" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#5061ad" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8d9ad4"/>
      <stop offset="1" stop-color="#5061ad"/>
    </linearGradient>
    <radialGradient id="aiFill" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#1b2030"/>
      <stop offset="1" stop-color="#10131d"/>
    </radialGradient>
    <radialGradient id="hexGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5061ad" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#5061ad" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 100H1200M0 200H1200M0 300H1200M0 400H1200M0 500H1200"/>
    <path d="M100 0V600M200 0V600M300 0V600M400 0V600M500 0V600M600 0V600M700 0V600M800 0V600M900 0V600M1000 0V600M1100 0V600"/>
  </g>

  <!-- Connections -->
  <!-- browser -> gateway (same origin, solid) -->
  <path d="M360 300 H 524" stroke="url(#accent)" stroke-width="3" stroke-opacity="0.85" stroke-linecap="round" fill="none"/>
  <!-- gateway -> AI (key travels only here, dashed) -->
  <path d="M676 300 H 876" stroke="url(#accent)" stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round" stroke-opacity="0.95" fill="none"/>

  <!-- Browser / chat UI window -->
  <g>
    <rect x="80" y="170" width="280" height="260" rx="18" fill="#13151c" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="80" y="170" width="280" height="44" rx="18" fill="#1a1d27"/>
    <rect x="80" y="196" width="280" height="18" fill="#1a1d27"/>
    <circle cx="106" cy="192" r="6" fill="#ff5f57"/>
    <circle cx="128" cy="192" r="6" fill="#febc2e"/>
    <circle cx="150" cy="192" r="6" fill="#28c840"/>
    <!-- model selector pill -->
    <rect x="104" y="238" width="120" height="22" rx="11" fill="#222738" stroke="#5061ad" stroke-opacity="0.5"/>
    <circle cx="118" cy="249" r="4" fill="#8d9ad4"/>
    <rect x="130" y="245" width="74" height="8" rx="4" fill="#5b6486"/>
    <!-- assistant bubble -->
    <rect x="104" y="278" width="180" height="46" rx="12" fill="#1d2333"/>
    <rect x="118" y="291" width="120" height="8" rx="4" fill="#8d9ad4"/>
    <rect x="118" y="306" width="150" height="8" rx="4" fill="#3a4156"/>
    <!-- user bubble -->
    <rect x="156" y="334" width="128" height="34" rx="12" fill="#2b3350"/>
    <rect x="170" y="347" width="100" height="8" rx="4" fill="#9aa6d6"/>
    <!-- input -->
    <rect x="104" y="384" width="150" height="26" rx="13" fill="#222738" stroke="#ffffff" stroke-opacity="0.06"/>
    <circle cx="270" cy="397" r="13" fill="url(#accent)"/>
    <path d="M265 397 L274 397 M270 392 L275 397 L270 402" stroke="#0a0b11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Gateway hexagon with lock (the Worker holds the credential) -->
  <g>
    <circle cx="600" cy="300" r="110" fill="url(#hexGlow)"/>
    <polygon points="672,300 636,362 564,362 528,300 564,238 636,238" fill="#141826" stroke="url(#accent)" stroke-width="2.5"/>
    <!-- lock -->
    <path d="M583 296 v-10 a17 17 0 0 1 34 0 v10" fill="none" stroke="#bcc6ec" stroke-width="4"/>
    <rect x="576" y="296" width="48" height="38" rx="7" fill="#222b45" stroke="#8d9ad4" stroke-width="2"/>
    <circle cx="600" cy="311" r="5" fill="#bcc6ec"/>
    <rect x="598" y="313" width="4" height="11" rx="2" fill="#bcc6ec"/>
  </g>

  <!-- key glyph riding the gateway -> AI link -->
  <g transform="translate(776 300)">
    <circle cx="-6" cy="0" r="7" fill="none" stroke="#bcc6ec" stroke-width="3"/>
    <path d="M1 0 H 14 M9 0 V 7 M14 0 V 6" stroke="#bcc6ec" stroke-width="3" stroke-linecap="round" fill="none"/>
  </g>

  <!-- AI model node -->
  <g>
    <circle cx="950" cy="300" r="80" fill="url(#aiFill)" stroke="url(#accent)" stroke-width="2"/>
    <!-- main sparkle -->
    <path d="M950 258 C 956 290, 960 294, 992 300 C 960 306, 956 310, 950 342 C 944 310, 940 306, 908 300 C 940 294, 944 290, 950 258 Z" fill="url(#accent)"/>
    <!-- small sparkles -->
    <path d="M918 262 C 920 274, 921 275, 933 277 C 921 279, 920 280, 918 292 C 916 280, 915 279, 903 277 C 915 275, 916 274, 918 262 Z" fill="#8d9ad4" fill-opacity="0.85"/>
    <path d="M984 320 C 985 328, 986 329, 994 330 C 986 331, 985 332, 984 340 C 983 332, 982 331, 974 330 C 982 329, 983 328, 984 320 Z" fill="#8d9ad4" fill-opacity="0.7"/>
  </g>
</svg>
